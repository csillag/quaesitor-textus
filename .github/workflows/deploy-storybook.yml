name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package (required by antd Storybook)
        run: pnpm --filter @quaesitor-textus/core build

      - name: Build core Storybook
        run: pnpm --filter @quaesitor-textus/core build-storybook

      - name: Build antd Storybook
        run: pnpm --filter @quaesitor-textus/antd build-storybook

      - name: Combine Storybooks
        run: |
          mkdir -p combined/core combined/antd
          cp -r packages/core/storybook-static/. combined/core/
          cp -r packages/antd/storybook-static/. combined/antd/
          cat > combined/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>quaesitor-textus Storybook</title>
            <style>
              body { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
              h1 { font-size: 1.4rem; }
              ul { padding: 0; list-style: none; }
              li { margin: 12px 0; }
              a { font-size: 1.1rem; }
            </style>
          </head>
          <body>
            <h1>quaesitor-textus Storybook</h1>
            <ul>
              <li><a href="core/">Core</a> — headless components, plain HTML input</li>
              <li><a href="antd/">Antd</a> — Ant Design SearchInput</li>
            </ul>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
